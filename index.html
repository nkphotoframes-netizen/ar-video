<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Photo Video Overlay</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    a-scene {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100vw !important;
      height: 100vh !important;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    #start-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 18px 35px;
      font-size: 18px;
      z-index: 999;
      border: none;
      border-radius: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
    }
  </style>
</head>

<body>

<button id="start-btn">Tap to Start AR</button>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind;"
  embedded
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <video
      id="video"
      src="./video.mp4"
      preload="auto"
      playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">

    <!-- MATCHED TO IMAGE RATIO (1080 x 1347) -->
    <!-- aspect ratio ≈ 0.80 -->
    <!-- height = width × 1.247 -->

    <a-video
      src="#video"
      width="1"
      height="1.247"
      position="0 0 0">
    </a-video>

  </a-entity>

</a-scene>

<script>
  const scene = document.querySelector("a-scene");
  const video = document.querySelector("#video");
  const target = document.querySelector("#target");
  const btn = document.querySelector("#start-btn");

  // Start AR only (no video play here)
  btn.addEventListener("click", async () => {
    await scene.systems["mindar-image-system"].start();
    btn.style.display = "none";
  });

  // Play video only when image is found
  target.addEventListener("targetFound", () => {
    video.play();
  });

  // Stop video when image is lost
  target.addEventListener("targetLost", () => {
    video.pause();
    video.currentTime = 0;
  });
</script>

</body>
</html>
